services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: trackr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-jobtracker_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-job_tracker}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobtracker_user} -d ${POSTGRES_DB:-job_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations ──────────────────────────────────────────────────────────────
  migrate:
    image: migrate/migrate:latest
    container_name: trackr-migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://${POSTGRES_USER:-jobtracker_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-job_tracker}?sslmode=disable
      up
    restart: on-failure

  # ── Go backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trackr-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT:                           "8080"
      DATABASE_URL:                   postgres://${POSTGRES_USER:-jobtracker_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-job_tracker}?sslmode=disable
      JWT_SECRET:                     ${JWT_SECRET}
      JWT_EXPIRY_HOURS:               ${JWT_EXPIRY_HOURS:-24}
      JWT_REFRESH_EXPIRY_DAYS:        ${JWT_REFRESH_EXPIRY_DAYS:-7}
      REMINDER_CHECK_INTERVAL_MINUTES: ${REMINDER_CHECK_INTERVAL_MINUTES:-60}
      SMTP_HOST:                      ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:                      ${SMTP_PORT:-587}
      SMTP_USERNAME:                  ${SMTP_USERNAME}
      SMTP_PASSWORD:                  ${SMTP_PASSWORD}
      FROM_ADDRESS:                   ${FROM_ADDRESS}
      FROM_NAME:                      ${FROM_NAME:-Trackr}
      APP_URL:                        ${APP_URL:-http://localhost:5173}
      GEMINI_API_KEY:                 ${GEMINI_API_KEY}
    ports:
      - "8080:8080"
    expose:
      - "9091"   # internal metrics port — reachable by Prometheus, not the host

  # ── React frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trackr-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  # ── PostgreSQL Exporter ─────────────────────────────────────────────────────
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: trackr-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-trackr}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-job_tracker}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: trackr-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - postgres_exporter

  # ── Node Exporter (host metrics) ────────────────────────────────────────────
  node_exporter:
    image: prom/node-exporter:latest
    container_name: trackr-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"

  # ── Loki (log storage) ──────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: trackr-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # ── Promtail (log shipper) ──────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: trackr-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: trackr-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  db_data:
  prometheus_data:
  loki_data:
  grafana_data:
