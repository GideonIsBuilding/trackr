server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # Scrape all Docker container logs
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Parse the Docker JSON log wrapper
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      # Extract container name from Docker attributes
      - json:
          expressions:
            tag:
          source: attrs
      - regex:
          expression: (?P<container_name>(?:[^|]*[^|]))
          source: tag
      # Add container label for filtering in Grafana
      - labels:
          stream:
          container: container_name
      # Use the actual log message as the log line
      - output:
          source: output

      # Parse structured JSON logs from the Go backend
      - match:
          selector: '{container="trackr-backend"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
                  time: time
            - labels:
                level:
