global:
  scrape_interval:     15s  # How often to scrape targets
  evaluation_interval: 15s  # How often to evaluate alerting rules

scrape_configs:

  # Scrape Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Scrape the Trackr Go backend — internal metrics port (not host-mapped)
  - job_name: trackr_backend
    static_configs:
      - targets: ['backend:9091']
    metrics_path: /metrics

  # Scrape host-level metrics from node_exporter
  - job_name: node
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: postgres
    static_configs:
      - targets: ['postgres_exporter:9187']
 